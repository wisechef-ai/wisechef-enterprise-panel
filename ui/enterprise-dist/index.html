<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#18181b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="WiseChef Enterprise" />
    <title>WiseChef Enterprise</title>
    <link rel="icon" href="/enterprise/favicon.ico" sizes="48x48" />
    <link rel="icon" href="/enterprise/favicon.svg" type="image/svg+xml" />
    <link rel="icon" type="image/png" sizes="32x32" href="/enterprise/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/enterprise/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/enterprise/apple-touch-icon.png" />
    <link rel="manifest" href="/enterprise/site.webmanifest" />
    <script>
      (() => {
        const key = "paperclip.theme";
        const darkThemeColor = "#18181b";
        const lightThemeColor = "#ffffff";
        try {
          const stored = window.localStorage.getItem(key);
          const theme = stored === "light" || stored === "dark" ? stored : "dark";
          const isDark = theme === "dark";
          document.documentElement.classList.toggle("dark", isDark);
          document.documentElement.style.colorScheme = isDark ? "dark" : "light";
          const themeColorMeta = document.querySelector('meta[name="theme-color"]');
          if (themeColorMeta) {
            themeColorMeta.setAttribute("content", isDark ? darkThemeColor : lightThemeColor);
          }
        } catch {
          document.documentElement.classList.add("dark");
          document.documentElement.style.colorScheme = "dark";
        }
      })();
    </script>
    <script type="module" crossorigin src="/enterprise/assets/index-DrB-XHld.js"></script>
    <link rel="stylesheet" crossorigin href="/enterprise/assets/index-C7nhkvUI.css">
  </head>

    <div id="root"></div>
  </body>
</html>
